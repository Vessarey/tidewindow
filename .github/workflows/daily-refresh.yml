# Daily data refresh: re-runs the NOAA pipeline, commits fresh window data,
# and pushes — which triggers the Pages deploy. This keeps every page's
# numbers current even on days the editorial agent does nothing.
name: Daily data refresh

on:
  schedule:
    - cron: "17 10 * * *" # 10:17 UTC daily (~3:17 AM Pacific)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh NOAA data
        run: PIPELINE_REFRESH=1 node scripts/pipeline/run.mjs
      - name: Regenerate fact sheets
        run: node scripts/pipeline/facts.mjs
      - name: Build (verifies data integrity)
        run: npm run build
      - name: Submit to IndexNow
        run: node scripts/indexnow.mjs
        continue-on-error: true
      - name: Commit and push
        run: |
          git config user.name "tidewindow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A public/data-json public/ics public/embed-badge docs-internal/facts
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: daily NOAA refresh $(date -u +%F)"
            git push
          fi
