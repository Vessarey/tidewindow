name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # The daily-refresh job commits fresh NOAA data using the default GITHUB_TOKEN,
  # and GitHub deliberately does NOT fire push-triggered workflows for such pushes
  # (recursion guard). Without this, refreshed tide numbers never deploy. Listening
  # for the refresh run's completion sidesteps that restriction.
  workflow_run:
    workflows: ["Daily data refresh"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # For workflow_run, only deploy when the refresh actually succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
