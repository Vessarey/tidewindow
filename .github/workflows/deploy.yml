# Since 2026-07-03 the site lives at https://thetidewindow.com (Vercel deploys
# on every push via the GitHub integration). This workflow now only publishes
# permanent-redirect stubs for the old vessarey.github.io/tidewindow/* URLs.
# Run manually (workflow_dispatch) if the redirect set ever needs regenerating.
name: Pages redirect stubs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/pages-redirect-stubs.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-stubs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages intermittently rejects deployments with a transient "Deployment
      # failed, try again later" — retry twice with backoff.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - id: retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        run: sleep 180
      - id: retry2
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
